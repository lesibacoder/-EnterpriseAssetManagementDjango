{% extends "base.html" %}

{% block title %}
{{ title }}
{% endblock %}

{% block page_title %}
{{ title }}
{% endblock %}

{% block content %}

<div class="card shadow-sm border-0">

    <div class="card-header">

        <h5>

            <i class="fas fa-user-plus text-primary"></i>

            {{ title }}

        </h5>

    </div>

    <div class="card-body">

        <form
            method="POST"
            enctype="multipart/form-data">

            {% csrf_token %}

            <div class="row">

                {% for field in form %}

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        {{ field.label }}

                    </label>

                    {{ field }}

                    {% if field.errors %}

                        <small class="text-danger">

                            {{ field.errors }}

                        </small>

                    {% endif %}

                </div>

                {% endfor %}

            </div>

            <div class="mt-4">

                <button class="btn btn-primary px-4">

                    <i class="fas fa-save"></i>

                    Save Employee

                </button>

                <a href="{% url 'employee_index' %}"
                class="btn btn-light px-4">

                    Cancel

                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
