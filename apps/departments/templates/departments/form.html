{% extends "base.html" %}

{% block title %}
{{ title }}
{% endblock %}

{% block page_title %}
{{ title }}
{% endblock %}

{% block content %}

<div class="card shadow-sm border-0">

    <div class="card-header">

        <h5>

            <i class="fas fa-building text-primary me-2"></i>

            {{ title }}

        </h5>

    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            <div class="row">

                {% for field in form %}

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        {{ field.label }}

                    </label>

                    {{ field }}

                    {% if field.errors %}

                        <small class="text-danger">

                            {{ field.errors }}

                        </small>

                    {% endif %}

                </div>

                {% endfor %}

            </div>

            <div class="mt-4">

                <button class="btn btn-primary">

                    <i class="fas fa-save me-2"></i>

                    Save Department

                </button>

                <a

                    href="{% url 'department_index' %}"

                    class="btn btn-secondary">

                    Cancel

                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
